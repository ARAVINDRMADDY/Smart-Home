<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Smart Home</title>
   <link rel="icon" type="image/jpeg" href="images/growwpark_logo.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'brand-black': '#000000',
            'brand-white': '#FFFFFF',
            'brand-copper': '#B87333',
            'brand-bronze': '#E6BE8A',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.5s ease-out;
    }
    .progress-step {
      transition: all 0.3s ease;
    }
    .progress-step.active {
      background-color: #B87333;
      color: white;
      border-color: #B87333;
    }
    
    /* Hide scrollbar completely */
    ::-webkit-scrollbar { display: none; }
    html, body {
      overflow-x: hidden;
      width: 100%;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="font-sans antialiased bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">

  <nav class="bg-white dark:bg-brand-black border-b border-gray-200 dark:border-gray-800 z-50 flex-shrink-0 transition-colors duration-300 sticky top-0">
    <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-12 sm:h-16">

        <div class="flex items-center">
          <a href="index.html" class="hover:opacity-80 transition-opacity">
            <h1 class="text-lg sm:text-2xl font-bold text-brand-black dark:text-brand-white transition-colors">
              Smart <span class="text-brand-copper">Home</span>
            </h1>
          </a>
        </div>

        <div class="flex items-center gap-1.5 sm:gap-2">
          <button id="themeToggle" onclick="toggleTheme()" class="p-1 sm:p-2 rounded sm:rounded-lg bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 transition-all text-gray-800 dark:text-brand-white flex items-center justify-center w-7 h-7 sm:w-auto sm:h-auto">
            <i class="fas fa-moon dark:hidden text-[11px] sm:text-base"></i>
            <i class="fas fa-sun text-brand-bronze hidden dark:inline text-[11px] sm:text-base"></i>
          </button>

          <button id="rtlToggle" onclick="toggleRTL()" class="p-1 sm:p-2 rounded sm:rounded-lg bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 transition-all text-gray-800 dark:text-brand-white font-bold text-[9px] sm:text-xs w-7 h-7 sm:w-9 sm:h-9 flex items-center justify-center">
            <span id="rtlText">RTL</span>
          </button>
        </div>

      </div>
    </div>
  </nav>

  <div class="fixed top-20 ltr:left-10 rtl:right-10 w-72 h-72 bg-brand-copper/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0"></div>
  <div class="fixed bottom-20 ltr:right-10 rtl:left-10 w-96 h-96 bg-brand-bronze/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0" style="animation-delay: 1.5s;"></div>

  <div class="flex-1 flex items-center justify-center px-3 py-3 sm:px-4 sm:py-8 relative z-10 w-full">
    <div class="w-full max-w-sm sm:max-w-md">
      
      <div class="bg-white dark:bg-gray-800 rounded-xl sm:rounded-3xl shadow-xl sm:shadow-2xl p-4 sm:p-8 border border-gray-100 dark:border-gray-700 animate-fade-in transition-colors duration-300 w-full">

        <div class="flex items-center justify-center mb-3 sm:mb-6 gap-1 sm:gap-2">
          <div class="progress-step active w-5 h-5 sm:w-8 sm:h-8 rounded-full flex items-center justify-center font-bold border text-[10px] sm:text-sm shrink-0">1</div>
          <div class="w-5 sm:w-8 h-0.5 bg-gray-200 dark:bg-gray-700 rounded transition-colors duration-300"></div>
          <div class="progress-step w-5 h-5 sm:w-8 sm:h-8 rounded-full flex items-center justify-center font-bold border border-gray-200 dark:border-gray-600 text-gray-400 text-[10px] sm:text-sm transition-colors duration-300 shrink-0">2</div>
          <div class="w-5 sm:w-8 h-0.5 bg-gray-200 dark:bg-gray-700 rounded transition-colors duration-300"></div>
          <div class="progress-step w-5 h-5 sm:w-8 sm:h-8 rounded-full flex items-center justify-center font-bold border border-gray-200 dark:border-gray-600 text-gray-400 text-[10px] sm:text-sm transition-colors duration-300 shrink-0">3</div>
        </div>

        <div class="text-center mb-3 sm:mb-6">
          <h2 class="text-lg sm:text-2xl font-bold text-brand-black dark:text-brand-white leading-tight sm:mb-1 transition-colors duration-300">Create Account</h2>
          <p class="text-gray-600 dark:text-gray-400 text-[10px] sm:text-sm mt-0.5 sm:mt-0 transition-colors duration-300">Start your smart home journey</p>
        </div>

        <form class="space-y-2 sm:space-y-4" onsubmit="handleRegister(event)">

          <div>
            <label class="block text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300 mb-0.5 sm:mb-1 transition-colors duration-300">Name</label>
            <input type="text" required placeholder="John Doe" class="w-full px-2 py-1 sm:px-3 sm:py-2 text-xs sm:text-sm rounded-md sm:rounded-lg border sm:border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-700 text-gray-900 dark:text-brand-white focus:border-brand-copper focus:ring-1 sm:focus:ring-2 focus:ring-brand-copper/20 outline-none transition-all placeholder-gray-400" />
          </div>

          <div>
            <label class="block text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300 mb-0.5 sm:mb-1 transition-colors duration-300">
              <i class="fas fa-envelope ltr:mr-1 rtl:ml-1 text-brand-copper"></i>Email
            </label>
            <input type="email" required placeholder="name@example.com" class="w-full px-2 py-1 sm:px-3 sm:py-2 text-xs sm:text-sm rounded-md sm:rounded-lg border sm:border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-700 text-gray-900 dark:text-brand-white focus:border-brand-copper focus:ring-1 sm:focus:ring-2 focus:ring-brand-copper/20 outline-none transition-all placeholder-gray-400" />
          </div>

          <div>
            <label class="block text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300 mb-0.5 sm:mb-1 transition-colors duration-300">
              <i class="fas fa-phone ltr:mr-1 rtl:ml-1 text-brand-copper"></i>Phone
            </label>
            <input type="tel" required placeholder="+91 98765 43210" class="w-full px-2 py-1 sm:px-3 sm:py-2 text-xs sm:text-sm rounded-md sm:rounded-lg border sm:border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-700 text-gray-900 dark:text-brand-white focus:border-brand-copper focus:ring-1 sm:focus:ring-2 focus:ring-brand-copper/20 outline-none transition-all placeholder-gray-400" />
          </div>

          <div class="grid grid-cols-2 gap-2 sm:gap-4">
            <div>
              <label class="block text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300 mb-0.5 sm:mb-1 transition-colors duration-300">Password</label>
              <div class="relative">
                <input type="password" id="password" required placeholder="Password" class="w-full px-2 py-1 sm:px-3 sm:py-2 text-xs sm:text-sm rounded-md sm:rounded-lg border sm:border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-700 text-gray-900 dark:text-brand-white focus:border-brand-copper focus:ring-1 sm:focus:ring-2 focus:ring-brand-copper/20 outline-none transition-all ltr:pr-7 rtl:pl-7 sm:ltr:pr-8 sm:rtl:pl-8 placeholder-gray-400" />
                <button type="button" onclick="togglePassword('password', 'toggleIcon1')" class="absolute ltr:right-1.5 rtl:left-1.5 sm:ltr:right-2 sm:rtl:left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand-copper dark:hover:text-brand-bronze transition-colors flex items-center justify-center h-full px-1 sm:px-2">
                  <i class="fas fa-eye text-[10px] sm:text-xs" id="toggleIcon1"></i>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300 mb-0.5 sm:mb-1 transition-colors duration-300">Confirm</label>
              <div class="relative">
                <input type="password" id="confirmPassword" required placeholder="Confirm" class="w-full px-2 py-1 sm:px-3 sm:py-2 text-xs sm:text-sm rounded-md sm:rounded-lg border sm:border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-700 text-gray-900 dark:text-brand-white focus:border-brand-copper focus:ring-1 sm:focus:ring-2 focus:ring-brand-copper/20 outline-none transition-all ltr:pr-7 rtl:pl-7 sm:ltr:pr-8 sm:rtl:pl-8 placeholder-gray-400" />
                <button type="button" onclick="togglePassword('confirmPassword', 'toggleIcon2')" class="absolute ltr:right-1.5 rtl:left-1.5 sm:ltr:right-2 sm:rtl:left-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand-copper dark:hover:text-brand-bronze transition-colors flex items-center justify-center h-full px-1 sm:px-2">
                  <i class="fas fa-eye text-[10px] sm:text-xs" id="toggleIcon2"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-start mt-1 sm:mt-2">
            <input type="checkbox" required class="w-3 h-3 sm:w-4 sm:h-4 mt-0.5 rounded border-gray-300 text-brand-copper focus:ring-brand-copper/20 cursor-pointer shrink-0">
            <span class="ltr:ml-1.5 rtl:mr-1.5 sm:ltr:ml-2 sm:rtl:mr-2 text-[10px] sm:text-xs text-gray-600 dark:text-gray-400 transition-colors duration-300 leading-tight sm:leading-snug">
              I agree to <a href="#" class="text-brand-copper font-semibold hover:underline">Terms of Service</a>
            </span>
          </div>

          <button type="submit" class="w-full py-1.5 sm:py-3 bg-brand-copper hover:bg-[#8B4513] text-brand-white font-bold rounded-md sm:rounded-xl shadow sm:shadow-lg hover:shadow-brand-copper/30 transform hover:scale-[1.02] transition-all duration-300 text-xs sm:text-sm mt-2 sm:mt-4">
            <i class="fas fa-user-plus text-[10px] sm:text-sm ltr:mr-1 rtl:ml-1"></i>Create Account
          </button>

          <div class="relative my-2.5 sm:my-4">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200 dark:border-gray-600 transition-colors duration-300"></div>
            </div>
            <div class="relative flex justify-center text-[10px] sm:text-xs">
              <span class="px-2 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 transition-colors duration-300">Or sign up with</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2 sm:gap-4">
            <button type="button" class="flex items-center justify-center px-2 py-1 sm:px-3 sm:py-2.5 border sm:border-2 border-gray-200 dark:border-gray-600 rounded-md sm:rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all w-full">
              <svg class="w-3 h-3 sm:w-4 sm:h-4 ltr:mr-1.5 rtl:ml-1.5 sm:ltr:mr-2 sm:rtl:ml-2" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span class="text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300">Google</span>
            </button>
            <button type="button" class="flex items-center justify-center px-2 py-1 sm:px-3 sm:py-2.5 border sm:border-2 border-gray-200 dark:border-gray-600 rounded-md sm:rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-all w-full">
              <i class="fab fa-facebook text-blue-600 text-[12px] sm:text-sm ltr:mr-1.5 rtl:ml-1.5 sm:ltr:mr-2 sm:rtl:ml-2"></i>
              <span class="text-[10px] sm:text-xs font-semibold text-gray-700 dark:text-gray-300">Facebook</span>
            </button>
          </div>

        </form>

        <div class="mt-2.5 sm:mt-4 text-center text-[10px] sm:text-xs text-gray-600 dark:text-gray-400 transition-colors duration-300">
          Already have an account? 
          <a href="login.html" class="text-brand-copper font-bold hover:text-[#8B4513] dark:hover:text-brand-bronze transition-colors ltr:ml-1 rtl:mr-1">Sign In</a>
        </div>

      </div>

    </div>
  </div>

  <script>
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const toggleIcon = document.getElementById(iconId);

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    function handleRegister(event) {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      const button = event.target.querySelector('button[type="submit"]');
      button.innerHTML = '<i class="fas fa-spinner fa-spin text-[10px] sm:text-sm ltr:mr-1 sm:ltr:mr-2 rtl:ml-1 sm:rtl:ml-2"></i>Creating Account...';
      button.disabled = true;
      button.classList.add('opacity-75', 'cursor-not-allowed');

      setTimeout(() => {
        alert('Account created successfully!');
        window.location.href = 'login.html';
      }, 1500);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');

      if (isDark) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    function toggleRTL() {
      const html = document.documentElement;
      const currentDir = html.getAttribute('dir') || 'ltr';
      const text = document.getElementById('rtlText');

      if (currentDir === 'ltr') {
        html.setAttribute('dir', 'rtl');
        localStorage.setItem('direction', 'rtl');
        text.textContent = 'LTR';
      } else {
        html.setAttribute('dir', 'ltr');
        localStorage.setItem('direction', 'ltr');
        text.textContent = 'RTL';
      }
    }

    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      }

      const savedDirection = localStorage.getItem('direction') || 'ltr';
      document.documentElement.setAttribute('dir', savedDirection);
      
      const text = document.getElementById('rtlText');
      if (text) {
        text.textContent = savedDirection === 'rtl' ? 'LTR' : 'RTL';
      }
    })();
  </script>

</body>
</html>
